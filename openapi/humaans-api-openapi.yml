openapi: 3.1.0
info:
  title: Humaans API
  version: '1.0'
  description: |
    The Humaans HRIS API exposes the People, Compensations, Time Away, Documents,
    Locations, Job Roles, Custom Fields, Performance, Timesheet, Webhooks, and
    related resources of the Humaans system of record. The API is REST-based,
    accepts and returns JSON, and uses Bearer token authentication scoped via
    OAuth scopes (public:read, private:read, private:write, compensations:read,
    compensations:write, documents:read, documents:write, webhooks:manage).
  contact:
    name: Humaans
    url: https://docs.humaans.io/api/
  termsOfService: https://humaans.io/terms
servers:
- url: https://app.humaans.io/api
  description: Humaans API production endpoint
security:
- bearerAuth: []
tags:
- name: People
  description: Employee records, the canonical resource of the HRIS
- name: Companies
  description: Tenant company record
- name: Compensations
  description: Salary, bonus, and compensation history
- name: Bank Accounts
  description: Employee bank account records
- name: Documents
  description: Personal and company document storage
- name: Time Away
  description: Time off, holidays, leave allocations, policies, and types
- name: Equipment
  description: Equipment assigned to employees
- name: Job Roles
  description: Position and role definitions
- name: Locations
  description: Office and remote work locations
- name: Custom Fields
  description: Tenant-defined custom field definitions and values
- name: Performance
  description: Performance reviews, cycles, templates, and ratings
- name: Timesheet
  description: Timesheet entries and submissions
- name: Webhooks
  description: Outbound HMAC-signed event subscriptions
- name: Audit Events
  description: Read-only audit trail
- name: Working Patterns
  description: Work schedule patterns
paths:
  /people:
    get:
      tags: [People]
      summary: List People
      operationId: listPeople
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Skip'
      responses:
        '200':
          description: Paginated list of people
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonList'
    post:
      tags: [People]
      summary: Create Person
      operationId: createPerson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Person'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
  /people/{id}:
    parameters:
    - $ref: '#/components/parameters/Id'
    get:
      tags: [People]
      summary: Retrieve Person
      operationId: getPerson
